<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
font-family: sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
}
.container {
width:100%;
max-width:600px;
padding:20px;
}
input {
width:100%;
padding:12px;
font-size:16px;
}
.buttons { display:flex; flex-wrap:wrap; }
button {
flex:1 1 30%;
padding:10px;
margin:5px;
}
#player { width:1px; height:1px; }

.list {
margin-top:15px;
background:white;
border-radius:10px;
padding:10px;
}

.item {
display:flex;
align-items:center;
border-bottom:1px solid #eee;
padding:8px;
}

.thumb {
width:60px;
height:45px;
margin-right:10px;
}

.title { flex:1; cursor:pointer; }

.del { color:red; margin-left:10px; cursor:pointer; }
</style>
</head>
<body>

<div class="container">

<h3>YouTube音プレイヤー</h3>

<input id="url" placeholder="URL貼るだけ">

<div class="buttons">
<button onclick="play()">再生</button>
<button onclick="togglePause()">⏸ / ▶</button>
<button onclick="cancel()">✖</button>
<button onclick="toggleLoop()" id="loopBtn">ループOFF</button>
<button onclick="saveFav()">★</button>
</div>

音量
<input type="range" min="0" max="100" value="50" id="volume">

<div id="player"></div>

<div class="list">
<h4>履歴</h4>
<div id="history"></div>

<h4>お気に入り</h4>
<div id="fav"></div>
</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let isLoop=false;
let currentUrl="";

// ID取得
function getId(url){
if(url.includes("v=")) return url.split("v=")[1].split("&")[0];
if(url.includes("youtu.be")) return url.split("/").pop();
return "";
}

// サムネ
function getThumb(url){
const id = getId(url);
return id ? `https://img.youtube.com/vi/${id}/default.jpg` : "";
}

// タイトル取得（プレイヤーから）
function getTitle(){
if(player && player.getVideoData){
return player.getVideoData().title || currentUrl;
}
return currentUrl;
}

// 再生
function play(urlInput){
const url = urlInput || document.getElementById("url").value;
if(!url) return;

document.getElementById("url").value=url;
currentUrl=url;

let config={};

if(url.includes("list=")){
const list=url.split("list=")[1].split("&")[0];
config={playerVars:{listType:'playlist',list:list,autoplay:1}};
}else{
const id=getId(url);
config={videoId:id,playerVars:{autoplay:1}};
}

if(player){
if(config.videoId){
player.loadVideoById(config.videoId);
}else{
player.loadPlaylist({list:config.playerVars.list});
}
}else{
player=new YT.Player('player',{
height:'1',width:'1',
...config,
events:{
onReady:e=>{
e.target.setVolume(document.getElementById("volume").value);
},
onStateChange:e=>{
if(e.data===YT.PlayerState.PLAYING){
saveHistory(currentUrl); // タイトル取得後に保存
}
if(e.data===YT.PlayerState.ENDED && isLoop){
play(currentUrl);
}
}
}
});
}
}

// 一時停止トグル
function togglePause(){
if(!player) return;
let s=player.getPlayerState();
s===1?player.pauseVideo():player.playVideo();
}

// キャンセル
function cancel(){
if(player){ player.destroy(); player=null; }
document.getElementById("player").innerHTML="";
document.getElementById("url").value="";
currentUrl="";
}

// ループ
function toggleLoop(){
isLoop=!isLoop;
document.getElementById("loopBtn").textContent=
isLoop?"ループON":"ループOFF";
}

// 音量
volume.oninput=e=>{
if(player) player.setVolume(e.target.value);
};

// 保存
function saveHistory(url){
let h=JSON.parse(localStorage.history||"[]");
h.unshift({url:url,title:getTitle()});
h=h.filter((v,i,a)=>a.findIndex(x=>x.url===v.url)===i).slice(0,10);
localStorage.history=JSON.stringify(h);
render();
}

function saveFav(){
if(!currentUrl) return;
let f=JSON.parse(localStorage.fav||"[]");
f.unshift({url:currentUrl,title:getTitle()});
f=f.filter((v,i,a)=>a.findIndex(x=>x.url===v.url)===i);
localStorage.fav=JSON.stringify(f);
render();
}

// 削除
function del(type,i){
let list=JSON.parse(localStorage[type]||"[]");
list.splice(i,1);
localStorage[type]=JSON.stringify(list);
render();
}

// 表示
function render(){
let h=JSON.parse(localStorage.history||"[]");
let f=JSON.parse(localStorage.fav||"[]");

history.innerHTML = h.map((v,i)=>`
<div class="item">
<img class="thumb" src="${getThumb(v.url)}">
<span class="title" onclick="play('${v.url}')">${v.title}</span>
<span class="del" onclick="del('history',${i})">削除</span>
</div>`).join("");

fav.innerHTML = f.map((v,i)=>`
<div class="item">
<img class="thumb" src="${getThumb(v.url)}">
<span class="title" onclick="play('${v.url}')">★ ${v.title}</span>
<span class="del" onclick="del('fav',${i})">削除</span>
</div>`).join("");
}

render();
</script>

</body>
</html>
