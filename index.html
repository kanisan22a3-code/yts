<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:sans-serif; background:#f5f5f5; display:flex; justify-content:center; }
.container { width:100%; max-width:600px; padding:20px; }
input { width:100%; padding:12px; font-size:16px; }
.buttons { display:flex; flex-wrap:wrap; }
button { flex:1 1 30%; padding:10px; margin:5px; }
#player { width:1px; height:1px; }

.list { margin-top:15px; background:white; border-radius:10px; padding:10px; }
.item { display:flex; align-items:center; border-bottom:1px solid #eee; padding:8px; }
.thumb { width:60px; height:45px; margin-right:10px; }
.title { flex:1; cursor:pointer; }
.del { color:red; margin-left:10px; cursor:pointer; }
</style>
</head>
<body>

<div class="container">
<h3>YouTube音プレイヤー</h3>

<input id="url" placeholder="URL貼るだけ">

<div class="buttons">
<button onclick="play()">再生</button>
<button onclick="togglePause()">⏸ / ▶</button>
<button onclick="cancel()">✖</button>
<button onclick="toggleLoop()" id="loopBtn">ループOFF</button>
<button onclick="saveFav()">★</button>
</div>

<div class="buttons">
<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
</div>

音量
<input type="range" id="volume" min="0" max="100" value="50">

再生位置
<input type="range" id="seek" min="0" max="0" value="0">
<div id="time">0:00 / 0:00</div>

再生速度
<select id="speed">
<option value="0.5">0.5x</option>
<option value="1" selected>1x</option>
<option value="1.5">1.5x</option>
<option value="2">2x</option>
</select>

<div id="player"></div>

<div class="list">
<h4>履歴</h4>
<div id="history"></div>

<h4>お気に入り</h4>
<div id="fav"></div>
</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let currentUrl="";
let isLoop=false;
let seeking=false;
let isReady=false;

// 要素取得
const urlInput = document.getElementById("url");
const volumeEl = document.getElementById("volume");
const speedEl = document.getElementById("speed");
const loopBtn = document.getElementById("loopBtn");
const seekEl = document.getElementById("seek");
const timeEl = document.getElementById("time");

// URL→ID
function getId(url){
try{
const u=new URL(url);
if(u.hostname.includes("youtu.be")) return u.pathname.slice(1);
if(u.searchParams.get("v")) return u.searchParams.get("v");
if(u.pathname.includes("/shorts/")) return u.pathname.split("/shorts/")[1];
if(u.pathname.includes("/live/")) return u.pathname.split("/live/")[1];
}catch(e){}
return "";
}

// サムネ
function getThumb(url){
const id=getId(url);
return id?`https://img.youtube.com/vi/${id}/default.jpg`:"";
}

// タイトル
function getTitle(){
try{
const t=player?.getVideoData()?.title;
if(t) return t;
}catch(e){}
return currentUrl;
}

// 再生
function play(urlArg){
const url=urlArg || urlInput.value;
if(!url) return;

urlInput.value=url;
currentUrl=url;

let config={};

if(url.includes("list=")){
const list=new URL(url).searchParams.get("list");
config={playerVars:{listType:'playlist',list:list,autoplay:1}};
}else{
const id=getId(url);
if(!id) return alert("URL不正");
config={videoId:id,playerVars:{autoplay:1}};
}

if(player){
config.videoId
? player.loadVideoById(config.videoId)
: player.loadPlaylist({list:config.playerVars.list});
}else{
player=new YT.Player("player",{
height:"1",width:"1",
...config,
events:{
onReady:e=>{
isReady=true;
e.target.setVolume(volumeEl.value);
e.target.setPlaybackRate(speedEl.value);
},
onStateChange:e=>{
if(e.data===YT.PlayerState.PLAYING) saveHistory(currentUrl);
if(e.data===YT.PlayerState.ENDED && isLoop) play(currentUrl);
}
}
});
}
}

// 操作
function togglePause(){
if(!player || !isReady) return;
player.getPlayerState()===1?player.pauseVideo():player.playVideo();
}
function next(){ if(player && isReady) player.nextVideo(); }
function prev(){ if(player && isReady) player.previousVideo(); }

function cancel(){
if(player){ player.destroy(); player=null; }
isReady=false;
urlInput.value="";
currentUrl="";
}

// ループ
function toggleLoop(){
isLoop=!isLoop;
loopBtn.textContent=isLoop?"ループON":"ループOFF";
}

// 音量・速度
volumeEl.addEventListener("input",e=>{
if(player && isReady) player.setVolume(e.target.value);
});
speedEl.addEventListener("change",e=>{
if(player && isReady) player.setPlaybackRate(parseFloat(e.target.value));
});

// 🔥 シーク（完全安定版）
function updateSeek(){
if(player && isReady && !seeking){
const d=player.getDuration();
const c=player.getCurrentTime();
if(d>0){
seekEl.max=d;
seekEl.value=c;
timeEl.textContent=format(c)+" / "+format(d);
}
}
requestAnimationFrame(updateSeek);
}
updateSeek();

seekEl.addEventListener("input",()=>{
if(!player || !isReady) return;
seeking=true;
player.seekTo(parseFloat(seekEl.value),true);
});

seekEl.addEventListener("change",()=>{
seeking=false;
});

function format(s){
s=Math.floor(s);
return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0");
}

// 保存
function saveHistory(url){
if(!url) return;
let h=JSON.parse(localStorage.getItem("history")||"[]");
h.unshift({url:url,title:getTitle()||url});
h=h.filter((v,i,a)=>a.findIndex(x=>x.url===v.url)===i).slice(0,10);
localStorage.setItem("history",JSON.stringify(h));
render();
}

function saveFav(){
if(!currentUrl) return;
let f=JSON.parse(localStorage.getItem("fav")||"[]");
f.unshift({url:currentUrl,title:getTitle()||currentUrl});
f=f.filter((v,i,a)=>a.findIndex(x=>x.url===v.url)===i);
localStorage.setItem("fav",JSON.stringify(f));
render();
}

function del(type,i){
let list=JSON.parse(localStorage.getItem(type)||"[]");
list.splice(i,1);
localStorage.setItem(type,JSON.stringify(list));
render();
}

// 表示
function render(){
const h=JSON.parse(localStorage.getItem("history")||"[]");
const f=JSON.parse(localStorage.getItem("fav")||"[]");

document.getElementById("history").innerHTML =
h.map((v,i)=>`
<div class="item">
<img class="thumb" src="${getThumb(v.url)}">
<span class="title" onclick="play('${v.url}')">${v.title}</span>
<span class="del" onclick="del('history',${i})">削除</span>
</div>`).join("");

document.getElementById("fav").innerHTML =
f.map((v,i)=>`
<div class="item">
<img class="thumb" src="${getThumb(v.url)}">
<span class="title" onclick="play('${v.url}')">★ ${v.title}</span>
<span class="del" onclick="del('fav',${i})">削除</span>
</div>`).join("");
}

render();
</script>

</body>
</html>
