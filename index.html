<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
font-family: sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
}
.container {
width:100%;
max-width:600px;
padding:20px;
}
input {
width:100%;
padding:12px;
font-size:16px;
}
.buttons { display:flex; flex-wrap:wrap; }
button {
flex:1 1 30%;
padding:10px;
margin:5px;
}
#player { width:1px; height:1px; }

.list {
margin-top:15px;
background:white;
border-radius:10px;
padding:10px;
}

.item {
display:flex;
align-items:center;
border-bottom:1px solid #eee;
padding:8px;
}

.thumb {
width:60px;
height:45px;
margin-right:10px;
}

.title { flex:1; cursor:pointer; }

.del { color:red; margin-left:10px; cursor:pointer; }
</style>
</head>
<body>

<div class="container">

<h3>YouTube音プレイヤー</h3>

<input id="url" placeholder="URL貼るだけ">

<div class="buttons">
<button onclick="play()">再生</button>
<button onclick="togglePause()">⏸ / ▶</button>
<button onclick="cancel()">✖</button>
<button onclick="toggleLoop()" id="loopBtn">ループOFF</button>
<button onclick="saveFav()">★</button>
</div>

音量
<input type="range" min="0" max="100" value="50" id="volume">

<div id="player"></div>

<div class="list">
<h4>履歴</h4>
<div id="history"></div>

<h4>お気に入り</h4>
<div id="fav"></div>
</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let isLoop=false;
let currentUrl="";

// 🔥 完全対応ID取得
function getId(url){
try {
const u = new URL(url);

if(u.hostname.includes("youtu.be")){
return u.pathname.replace("/", "");
}

if(u.searchParams.get("v")){
return u.searchParams.get("v");
}

if(u.pathname.includes("/shorts/")){
return u.pathname.split("/shorts/")[1];
}

if(u.pathname.includes("/live/")){
return u.pathname.split("/live/")[1];
}

} catch(e){}

return "";
}

// サムネ
function getThumb(url){
const id = getId(url);
return id ? `https://img.youtube.com/vi/${id}/default.jpg` : "";
}

// タイトル安全取得
function getTitle(){
try{
if(player && player.getVideoData){
const t = player.getVideoData().title;
if(t) return t;
}
}catch(e){}
return currentUrl;
}

// 再生
function play(urlInput){
const url = urlInput || document.getElementById("url").value;
if(!url) return;

document.getElementById("url").value = url;
currentUrl = url;

let config={};

if(url.includes("list=")){
const list = new URL(url).searchParams.get("list");
config={playerVars:{listType:'playlist',list:list,autoplay:1}};
}else{
const id=getId(url);
if(!id) return alert("URLが正しくない");
config={videoId:id,playerVars:{autoplay:1}};
}

if(player){
if(config.videoId){
player.loadVideoById(config.videoId);
}else{
player.loadPlaylist({list:config.playerVars.list});
}
}else{
player=new YT.Player('player',{
height:'1',width:'1',
...config,
events:{
onReady:e=>{
e.target.setVolume(document.getElementById("volume").value);
},
onStateChange:e=>{
if(e.data===YT.PlayerState.PLAYING){
saveHistory(currentUrl);
}
if(e.data===YT.PlayerState.ENDED && isLoop){
play(currentUrl);
}
}
}
});
}
}

// 一時停止トグル
function togglePause(){
if(!player) return;
let s=player.getPlayerState();
s===1?player.pauseVideo():player.playVideo();
}

// キャンセル
function cancel(){
if(player){ player.destroy(); player=null; }
document.getElementById("player").innerHTML="";
document.getElementById("url").value="";
currentUrl="";
}

// ループ
function toggleLoop(){
isLoop=!isLoop;
document.getElementById("loopBtn").textContent=
isLoop?"ループON":"ループOFF";
}

// 音量
document.getElementById("volume").addEventListener("input", e=>{
if(player) player.setVolume(e.target.value);
});

// 履歴保存（安定版）
function saveHistory(url){
if(!url) return;

let h = JSON.parse(localStorage.getItem("history") || "[]");

const item = {
url: url,
title: getTitle() || url
};

h.unshift(item);

h = h.filter((v,i,a)=>a.findIndex(x=>x.url===v.url)===i).slice(0,10);

localStorage.setItem("history", JSON.stringify(h));
render();
}

// お気に入り保存
function saveFav(){
if(!currentUrl) return;

let f = JSON.parse(localStorage.getItem("fav") || "[]");

const item = {
url: currentUrl,
title: getTitle() || currentUrl
};

f.unshift(item);

f = f.filter((v,i,a)=>a.findIndex(x=>x.url===v.url)===i);

localStorage.setItem("fav", JSON.stringify(f));
render();
}

// 削除
function del(type,i){
let list = JSON.parse(localStorage.getItem(type) || "[]");
list.splice(i,1);
localStorage.setItem(type, JSON.stringify(list));
render();
}

// 表示
function render(){
let h = JSON.parse(localStorage.getItem("history") || "[]");
let f = JSON.parse(localStorage.getItem("fav") || "[]");

document.getElementById("history").innerHTML =
h.map((v,i)=>`
<div class="item">
<img class="thumb" src="${getThumb(v.url)}">
<span class="title" onclick="play('${v.url}')">${v.title || v.url}</span>
<span class="del" onclick="del('history',${i})">削除</span>
</div>`).join("");

document.getElementById("fav").innerHTML =
f.map((v,i)=>`
<div class="item">
<img class="thumb" src="${getThumb(v.url)}">
<span class="title" onclick="play('${v.url}')">★ ${v.title || v.url}</span>
<span class="del" onclick="del('fav',${i})">削除</span>
</div>`).join("");
}

render();
</script>

</body>
</html>
