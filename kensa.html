<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TAL風 図形問題</title>
<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
}
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
}
.box {
  background: #fff;
  border-radius: 10px;
  margin: 20px;
  padding: 20px;
}
.container {
  display: flex;
}
.left {
  width: 40%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}
.shape {
  width: 70px;
  height: 70px;
  border: 2px solid transparent;
  cursor: pointer;
}
.selected {
  border: 3px solid red;
}
.right {
  width: 60%;
}
canvas {
  background: #fff;
}
button {
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  cursor: pointer;
}
.primary {
  background: #3b82f6;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <div>問題 1 / 10</div>
  <div>残り時間 <span id="timer">90</span>s</div>
</div>

<div class="box">
  <p>左の図形の中から、右の図の線で囲まれた部分に入る図形をすべて選んでください。</p>

  <div class="container">
    
    <!-- 左：図形 -->
    <div class="left" id="shapes"></div>

    <!-- 右：図 -->
    <div class="right">
      <canvas id="canvas" width="500" height="300"></canvas>
    </div>

  </div>

  <div style="text-align:center;">
    <button onclick="reset()">リセット</button>
    <button class="primary" onclick="submit()">決定する</button>
  </div>

</div>

<script>
// ===== 図形データ =====
const shapesData = [
  {type:"circle", color:"orange"},
  {type:"square", color:"blue"},
  {type:"triangle", color:"red"},
  {type:"circle", color:"yellow"},
  {type:"square", color:"green"},
  {type:"triangle", color:"blue"},
  {type:"circle", color:"red"},
  {type:"square", color:"orange"},
  {type:"triangle", color:"green"},
];

// 正解（例）
const correct = [1, 4];

// ===== 左側描画 =====
const container = document.getElementById("shapes");

shapesData.forEach((s, i)=>{
  const el = document.createElement("canvas");
  el.width = 70;
  el.height = 70;
  el.classList.add("shape");

  const ctx = el.getContext("2d");
  ctx.fillStyle = s.color;

  if(s.type==="circle"){
    ctx.beginPath();
    ctx.arc(35,35,25,0,Math.PI*2);
    ctx.fill();
  }
  if(s.type==="square"){
    ctx.fillRect(10,10,50,50);
  }
  if(s.type==="triangle"){
    ctx.beginPath();
    ctx.moveTo(35,10);
    ctx.lineTo(10,60);
    ctx.lineTo(60,60);
    ctx.closePath();
    ctx.fill();
  }

  el.onclick = ()=>{
    el.classList.toggle("selected");
  };

  container.appendChild(el);
});

// ===== 右側図 =====
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.lineWidth = 3;

// 図っぽい線
ctx.beginPath();
ctx.moveTo(100,200);
ctx.lineTo(200,80);
ctx.lineTo(350,80);
ctx.lineTo(420,200);
ctx.lineTo(100,200);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(200,120);
ctx.lineTo(350,120);
ctx.stroke();

ctx.beginPath();
ctx.arc(250,50,30,0,Math.PI*1.5);
ctx.stroke();

// ===== タイマー =====
let time = 90;
setInterval(()=>{
  time--;
  document.getElementById("timer").textContent = time;
},1000);

// ===== ボタン処理 =====
function reset(){
  document.querySelectorAll(".shape").forEach(el=>{
    el.classList.remove("selected");
  });
}

function submit(){
  const selected = [];
  document.querySelectorAll(".shape").forEach((el,i)=>{
    if(el.classList.contains("selected")) selected.push(i);
  });

  alert("選択: " + selected.join(", "));
}
</script>

</body>
</html>
