<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TAL完全版（判定付き）</title>
<style>
body{margin:0;font-family:sans-serif;background:#f3f4f6;}
.header{display:flex;justify-content:space-between;padding:15px 20px;}
.box{background:#fff;margin:20px;border-radius:12px;padding:20px;}
.container{display:flex;}
.left{
  width:40%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  border-right:2px dashed #999;
}
canvas.shape{width:80px;height:80px;cursor:pointer;}
.selected{outline:4px solid red;}
.right{width:60%;}
button{padding:12px 30px;border-radius:10px;border:none;margin:10px;}
.primary{background:#2563eb;color:white;}
</style>
</head>

<body>

<div class="header">
  <div>問題 1 / 10</div>
  <div>残り時間 <span id="time">90</span>s</div>
</div>

<div class="box">
<p>左の図形の中から、右の図の線で囲まれた部分に入る図形をすべて選んでください。</p>

<div class="container">
<div class="left" id="left"></div>
<div class="right">
<canvas id="main" width="600" height="350"></canvas>
</div>
</div>

<div style="text-align:center;">
<button onclick="reset()">リセット</button>
<button class="primary" onclick="submit()">決定する</button>
</div>

</div>

<script>
// ===== 図形（当たり判定用：ポリゴン）=====
const shapes = [
  // 四角
  [{x:10,y:10},{x:70,y:10},{x:70,y:70},{x:10,y:70}],
  // 三角
  [{x:40,y:10},{x:10,y:70},{x:70,y:70}],
  // 五角形
  [{x:40,y:10},{x:70,y:30},{x:60,y:70},{x:20,y:70},{x:10,y:30}],
  // 円（近似）
  Array.from({length:20},(_,i)=>{
    let a=i/20*Math.PI*2;
    return {x:40+30*Math.cos(a),y:40+30*Math.sin(a)};
  }),
];

// ===== 左描画 =====
const left = document.getElementById("left");

shapes.forEach((poly,i)=>{
  const cv=document.createElement("canvas");
  cv.width=80;cv.height=80;
  cv.className="shape";
  const ctx=cv.getContext("2d");

  ctx.beginPath();
  poly.forEach((p,j)=>{
    if(j===0) ctx.moveTo(p.x,p.y);
    else ctx.lineTo(p.x,p.y);
  });
  ctx.closePath();
  ctx.fillStyle=["blue","red","orange","gold"][i%4];
  ctx.fill();

  cv.onclick=()=>cv.classList.toggle("selected");
  left.appendChild(cv);
});

// ===== 右の枠（台形）=====
const polygon = [
  {x:260,y:120},
  {x:420,y:120},
  {x:480,y:250},
  {x:200,y:250}
];

// 描画
const c=document.getElementById("main").getContext("2d");
c.lineWidth=4;
c.beginPath();
c.moveTo(200,250);
c.lineTo(260,120);
c.lineTo(420,120);
c.lineTo(480,250);
c.closePath();
c.stroke();

// ===== 点が中か =====
function inside(p, vs){
  let x=p.x,y=p.y,inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i].x,yi=vs[i].y;
    let xj=vs[j].x,yj=vs[j].y;
    let intersect=((yi>y)!=(yj>y)) &&
      (x<(xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

// ===== 回転 =====
function rotate(poly, angle){
  const cx=40, cy=40;
  return poly.map(p=>{
    const x=p.x-cx, y=p.y-cy;
    return {
      x: x*Math.cos(angle)-y*Math.sin(angle)+cx,
      y: x*Math.sin(angle)+y*Math.cos(angle)+cy
    };
  });
}

// ===== スケール =====
function scale(poly, s){
  return poly.map(p=>({
    x:p.x*s,
    y:p.y*s
  }));
}

// ===== 平行移動 =====
function translate(poly, dx, dy){
  return poly.map(p=>({x:p.x+dx,y:p.y+dy}));
}

// ===== 判定（回転＋スケーリング総当たり）=====
function fits(poly){
  for(let s=1; s<4; s+=0.2){          // サイズ
    for(let r=0; r<Math.PI*2; r+=Math.PI/8){ // 回転
      let p = scale(poly, s);
      p = rotate(p, r);
      p = translate(p, 250, 150);

      if(p.every(pt=>inside(pt, polygon))){
        return true;
      }
    }
  }
  return false;
}

// ===== ボタン =====
function reset(){
  document.querySelectorAll(".shape").forEach(e=>e.classList.remove("selected"));
}

function submit(){
  const result=[];
  document.querySelectorAll(".shape").forEach((el,i)=>{
    if(el.classList.contains("selected")){
      if(fits(shapes[i])) result.push(i);
    }
  });

  alert("入る図形: "+result.join(", "));
}

// ===== タイマー =====
let t=90;
setInterval(()=>{
  t--;
  document.getElementById("time").textContent=t;
},1000);
</script>

</body>
</html>
